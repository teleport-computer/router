# Teamwork — production Nginx reverse proxy (EC2 port 80).
#
# Installed to /etc/nginx/sites-available/teamwork by deploy/bootstrap.sh.
# When you add a domain + TLS later, switch `listen 80` to 443 + SSL certs
# and redirect HTTP → HTTPS in a second server block.

upstream teamwork_server { server 127.0.0.1:3001; }
upstream teamwork_web    { server 127.0.0.1:3000; }

server {
    listen       80 default_server;
    listen       [::]:80 default_server;
    server_name  _;

    client_max_body_size 5M;

    # Better logs (timestamp + upstream status).
    access_log  /var/log/nginx/teamwork.access.log;
    error_log   /var/log/nginx/teamwork.error.log warn;

    # API + MCP → Node server
    # Match both `/mcp` (Streamable HTTP) and `/mcp/sse` (legacy SSE).
    location ~ ^/(api|mcp)(/|$) {
        proxy_pass http://teamwork_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE (MCP): no buffering, long read timeout
        proxy_buffering off;
        proxy_read_timeout 86400;
    }

    location = /health {
        proxy_pass http://teamwork_server/health;
        access_log off;
    }

    # Everything else → Next.js
    location / {
        proxy_pass http://teamwork_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
