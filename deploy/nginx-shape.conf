# Shape Rotator — production Nginx reverse proxy.
#
# Installed to /etc/nginx/sites-available/shape on EC2 (and symlinked into
# sites-enabled). Parallel to nginx-teamwork.conf which serves the Lark
# instance on router.feedling.app — the two vhosts coexist on the same
# nginx process by virtue of different server_name values.
#
# To install (one-time):
#   sudo cp deploy/nginx-shape.conf /etc/nginx/sites-available/shape
#   sudo ln -s /etc/nginx/sites-available/shape /etc/nginx/sites-enabled/shape
#   sudo certbot --nginx -d shaperotator.teleport.computer
#     (certbot will auto-edit this file to fill in the listen 443 + ssl_*
#      lines and add a port-80 redirect — the initial config below is the
#      pre-certbot shape, listening on port 80 only.)
#   sudo nginx -t && sudo systemctl reload nginx

upstream shape_server { server 127.0.0.1:4002; }
upstream shape_web    { server 127.0.0.1:4001; }

server {
    listen       80;
    listen       [::]:80;
    server_name  shaperotator.teleport.computer;

    client_max_body_size 5M;

    access_log  /var/log/nginx/shape.access.log;
    error_log   /var/log/nginx/shape.error.log warn;

    # API + MCP → Node server (4002)
    location ~ ^/(api|mcp)/ {
        proxy_pass http://shape_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE (MCP): no buffering, long read timeout
        proxy_buffering off;
        proxy_read_timeout 86400;
    }

    location = /health {
        proxy_pass http://shape_server/health;
        access_log off;
    }

    # Everything else → Next.js (4001)
    location / {
        proxy_pass http://shape_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
